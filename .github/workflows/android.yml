name: SkippyDroid

on:
  push:
    branches: [main]
    paths:
      - 'apps/SkippyDroid/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/SkippyDroid/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/SkippyDroid/.gradle
          key: gradle-${{ hashFiles('apps/SkippyDroid/**/*.gradle.kts', 'apps/SkippyDroid/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x apps/SkippyDroid/gradlew

      - name: Lint
        run: cd apps/SkippyDroid && ./gradlew lint

      - name: Unit tests
        run: cd apps/SkippyDroid && ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/SkippyDroid/app/build/reports/tests/
          retention-days: 7

      - name: Assemble debug APK
        run: cd apps/SkippyDroid && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/SkippyDroid/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
