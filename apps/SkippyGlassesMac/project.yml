name: SkippyGlassesMac
options:
  bundleIdPrefix: com.skippy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    INFOPLIST_FILE: Sources/Info.plist

targets:
  SkippyGlassesMac:
    type: application
    platform: macOS
    sources:
      - Sources/
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skippy.SkippyGlassesMac
        PRODUCT_NAME: SkippyGlassesMac
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/SkippyGlassesMac.entitlements
        OTHER_LDFLAGS: "-framework IOKit"
