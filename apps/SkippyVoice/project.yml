name: SkippyVoice
options:
  bundleIdPrefix: com.skippy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.10"
    INFOPLIST_FILE: SkippyVoice/Info.plist

targets:
  SkippyVoice:
    type: application
    platform: macOS
    sources:
      - path: SkippyVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skippy.SkippyVoice
        PRODUCT_NAME: SkippyVoice
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: SkippyVoice/SkippyVoice.entitlements
